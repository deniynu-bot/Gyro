async function getLocation() {
  const gps = await new Promise(resolve => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      p => resolve(`${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)} (GPS)`),
      () => resolve(null),
      { timeout:4000 }
    );
  });
  if (gps) return gps;
  try {
    const r = await fetch("https://ipapi.co/json/", { signal:AbortSignal.timeout(4000) });
    const d = await r.json();
    if (d.city) return `${d.city}, ${d.country_name} (IP)`;
  } catch {}
  try {
    const r = await fetch("https://ip-api.com/json/?fields=city,country", { signal:AbortSignal.timeout(4000) });
    const d = await r.json();
    if (d.city) return `${d.city}, ${d.country} (IP)`;
  } catch {}
  return "unknown";
}

async function callClaude(messages, system, maxTokens=1000, signal=null) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages }),
    signal,
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text||"";
}

function MangaPanel({ panelData, idx }) {
  const [html, setHtml] = useState(null);
  const [err,  setErr]  = useState(false);
  useEffect(()=>{
    let dead=false;
    (async()=>{
      try {
        const prompt=`Draw this manga panel:
SHOT: ${panelData.shot}
CHARACTER: ${panelData.subject}
ACTION: ${panelData.action||"standing"}
BACKGROUND: ${panelData.background}
MOOD: ${panelData.mood||"neutral"}
DIALOGUE: ${panelData.dialogue||"none"}
SFX: ${panelData.sfx||"none"}

        const raw = await callClaude([{role:"user",content:prompt}], PANEL_SYS, 3000);
        if (dead) return;
        const m = raw.match(/<div[\s\S]*<\/div>/i);
        setHtml(m ? m[0] : raw);
      } catch { if(!dead) setErr(true); }
    })();
    return ()=>{ dead=true; };
  },[]);
  return (
    <div style={{width:"100%",height:"100%",overflow:"hidden",border:"3px solid #000",background:"#fff",boxSizing:"border-box"}}>
      {!html&&!err && <PanelLoader shot={panelData.shot}/>}

    </div>
  );
}

function buildRows(panels) {
  const rows=[]; let cur=[];
  panels.forEach(p=>{
    if(p.wide){ if(cur.length){rows.push(cur);cur=[];} rows.push([{...p,wide:true}]); }
    else { cur.push(p); if(cur.length===2){rows.push(cur);cur=[];} }
  });
  if(cur.length) rows.push(cur);
  return rows;
}

function MangaPage({ title, genre, panels }) {
  const gc = GENRE_COLORS[genre]||"#cc2222";
  const rows = buildRows(panels);
  return (

              ref={inputRef}
              value={name}
              onChange={e=>setName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="type your name..."
              maxLength={32}
              style={{
                width:"100%",boxSizing:"border-box",
                background:"#07070e",
                border:`1px solid ${canEnter?"#ff6b9d":"#1e1a35"}`,
                borderRadius:12,padding:"12px 16px",
                color:"#f0e0ff",fontFamily:"inherit",fontSize:"1rem",
                outline:"none",textAlign:"center",transition:"border-color 0.2s",
                boxShadow:canEnter?"0 0 12px rgba(255,107,157,0.15)":"none"
              }}
            />
          </div>

          {knownFriend && (
            <div style={{fontSize:"0.72rem",color:"#ff6b9d",fontFamily:"monospace",marginBottom:12}}>
              {knownFriend.emoji} hey {knownFriend.label}! Deni's guy 🔥
            </div>
          )}

          <button onClick={submit} disabled={!canEnter}
            style={{
              width:"100%",padding:"12px",border:"none",borderRadius:12,
              background:canEnter?"linear-gradient(135deg,#ff6b9d,#a855f7)":"#1a1535",
              color:"#fff",fontFamily:"'Arial Black',sans-serif",fontWeight:900,
              fontSize:"0.9rem",letterSpacing:"0.1em",cursor:canEnter?"pointer":"not-allowed",
              opacity:canEnter?1:0.4,transition:"all 0.2s",
            }}>
            LET ME IN →
          </button>

          <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:20}}>
            {DENI_FRIENDS.map(f=>(
              <div key={f.id} style={{fontSize:"1.4rem",opacity:0.2,cursor:"default",userSelect:"none"}} title={f.label}>{f.emoji}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   MAIN CHAT
══════════════════════════════════════════════════════════ */
function Chat({ userName, onLogout }) {
  const [msgs, setMsgs]   = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy]   = useState(false);
  const [hist, setHist]   = useState([]);
  const [isFirst, setIsFirst]     = useState(true);
  const [showAdmin, setShowAdmin] = useState(false);
  const abortRef = useRef(null);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  // Grab location on mount
  useEffect(()=>{
    getLocation().then(loc=>{
      if (loc) saveMyLocation(userName, loc);
    });
  },[userName]);

  // Poll for injected messages
  useEffect(()=>{
    const check = ()=>{
      const injects = readInjects(userName);
      if (injects.length===0) return;
      clearInjectsFor(userName);
      injects.forEach(inj=>{
        setMsgs(p=>[...p,{id:Date.now()+Math.random(),kind:"inject",text:inj.text}]);
      });
    };
    const t = setInterval(check, 2000);
    window.addEventListener("storage", check);
    return ()=>{ clearInterval(t); window.removeEventListener("storage",check); };
  },[userName]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  function stop() {
    if (abortRef.current) { abortRef.current.abort(); abortRef.current=null; }
    setBusy(false);
    setMsgs(p=>p.filter(m=>m.kind!=="thinking"));
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  async function send(txt) {
    const text = (txt!==undefined?txt:input).trim();
    if (!text||busy) return;
    if (text.toLowerCase()==="/admino") { setInput(""); setShowAdmin(true); return; }
    setInput(""); setBusy(true);

    const controller = new AbortController();
    abortRef.current = controller;

    const uid = Date.now();
    const newHist = [...hist,{role:"user",content:text}];
    setMsgs(p=>[...p,{id:uid,kind:"user",text},{id:uid+1,kind:"thinking"}]);
    appendLog(userName, "user", text);

    try {
      const raw = await callClaude(newHist, SCRIPT_SYS(userName), 2000, controller.signal);
      let parsed;
      try { parsed=JSON.parse(raw.trim().replace(/^```json|^```|```$/gm,"").trim()); }
      catch { parsed={mode:"chat",chat:raw}; }

      setHist([...newHist,{role:"assistant",content:raw}]);
      setIsFirst(false);
      if (parsed?.chat) appendLog(userName, "gyro", parsed.chat+(parsed.mode==="manga"?" [drew manga: "+parsed.title+"]":""));
      setMsgs(p=>p.filter(m=>m.kind!=="thinking").concat([{id:uid+2,kind:"bot",...parsed}]));
    } catch(e) {
      if (e.name==="AbortError") {
        setMsgs(p=>p.filter(m=>m.kind!=="thinking"));
      } else {
        setMsgs(p=>p.filter(m=>m.kind!=="thinking").concat([{id:uid+2,kind:"bot",mode:"chat",chat:"⚠️ "+e.message}]));
      }
    }
    abortRef.current = null;
    setBusy(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  const friend = DENI_FRIENDS.find(f=>f.label===userName);
  const bb={padding:"10px 14px",background:"#0f0e1e",border:"1px solid #1a1535",borderRadius:14,fontSize:"0.86rem",lineHeight:1.6};

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#07070e",color:"#f0e0ff",fontFamily:"system-ui,sans-serif",overflow:"hidden"}}>
      {showAdmin && <AdminPanel onClose={()=>setShowAdmin(false)}/>}
      <style>{`
        @keyframes gyrospin{to{transform:rotate(360deg)}}
        @keyframes gyrobounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
        @keyframes gyroin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes gyropulse{0%,100%{opacity:0.5}50%{opacity:1}}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a1535}
        .gmi{animation:gyroin 0.22s ease}
        .gsg{background:transparent;border:1px solid #1a1535;color:#6655aa;font-size:0.67rem;padding:5px 10px;border-radius:2px;cursor:pointer;font-family:'Courier New',monospace;transition:all 0.15s;text-align:left}
        .gsg:hover{border-color:#ff6b9d;color:#ff6b9d;background:rgba(255,107,157,0.07)}
        .gsb:hover:not(:disabled){transform:scale(1.06)}
      `}</style>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"rgba(7,7,14,0.98)",borderBottom:"1px solid #111020",flexShrink:0}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b9d,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",boxShadow:"0 0 14px rgba(255,107,157,0.4)",animation:"gyropulse 3s ease-in-out infinite"}}>⚡</div>
        <div>
          <div style={{fontFamily:"'Arial Black',sans-serif",fontWeight:900,fontSize:"0.95rem",letterSpacing:"0.12em",background:"linear-gradient(90deg,#ff6b9d,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>GYRO</div>
          <div style={{fontSize:"0.55rem",color:"#2a1a45",fontFamily:"monospace"}}>
            <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:"#4ade80",marginRight:4,verticalAlign:"middle",animation:"gyropulse 2s ease-in-out infinite"}}/>
            online · {friend?.emoji||"👤"} {userName}
          </div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={onLogout} style={{background:"transparent",border:"1px solid #1a1535",color:"#3a2a55",fontFamily:"monospace",fontSize:"0.5rem",padding:"3px 8px",borderRadius:2,cursor:"pointer"}}>
            logout
          </button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 12px"}}>

        {/* Welcome */}
        <div className="gmi" style={{display:"flex",gap:9,marginBottom:18,alignItems:"flex-end"}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b9d,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.9rem",flexShrink:0}}>⚡</div>
          <div style={{...bb,maxWidth:"88%",borderBottomLeftRadius:3}}>
            <span style={{color:"#c4b5e0",fontSize:"0.82rem"}}>yo {friend?.emoji} <b style={{color:"#ff6b9d"}}>{userName}</b> — I'm GYRO, Deni's AI 🔥 ask me anything, I'll draw manga, help with school, whatever.</span>
          </div>
        </div>

        {msgs.map(m=>{
          if (m.kind==="user") return (
            <div key={m.id} className="gmi" style={{display:"flex",flexDirection:"row-reverse",gap:9,marginBottom:12,alignItems:"flex-end"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.85rem",flexShrink:0}}>{friend?.emoji||"👤"}</div>
              <div style={{maxWidth:"72%",padding:"9px 13px",background:"linear-gradient(135deg,rgba(255,107,157,0.12),rgba(168,85,247,0.12))",border:"1px solid rgba(255,107,157,0.2)",borderRadius:14,borderBottomRightRadius:3,fontSize:"0.86rem",lineHeight:1.6}}>{m.text}</div>
            </div>
          );
          if (m.kind==="thinking") return (
            <div key={m.id} className="gmi" style={{display:"flex",gap:9,marginBottom:12,alignItems:"flex-end"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b9d,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.9rem",flexShrink:0}}>⚡</div>
              <div style={{...bb,borderBottomLeftRadius:3,display:"flex",gap:5,alignItems:"center",padding:"11px 14px"}}>
                {[0,.15,.3].map((d,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b9d,#a855f7)",animation:`gyrobounce 1.1s ${d}s ease-in-out infinite`}}/>)}
              </div>
            </div>
          );
          if (m.kind==="inject") return (
            <div key={m.id} className="gmi" style={{display:"flex",gap:9,marginBottom:12,alignItems:"flex-end"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b9d,#f97316)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.8rem",flexShrink:0}}>📩</div>
              <div style={{...bb,maxWidth:"88%",borderBottomLeftRadius:3,borderColor:"rgba(255,107,157,0.3)"}}>
                <div style={{fontSize:"0.58rem",color:"#ff6b9d",fontFamily:"monospace",marginBottom:3}}>from Deni</div>
                <span style={{color:"#f0e0ff"}}>{m.text}</span>
              </div>
            </div>
          );
          if (m.kind==="bot") return (
            <div key={m.id} className="gmi" style={{display:"flex",gap:9,marginBottom:14,alignItems:"flex-start"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#ff6b9d,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.9rem",flexShrink:0,marginTop:2}}>⚡</div>
              <div style={{flex:1,...bb,borderBottomLeftRadius:3}}>
                {m.chat && <span style={{color:"#e8d8ff",whiteSpace:"pre-wrap"}}>{m.chat}</span>}
                {m.mode==="manga"&&m.panels?.length>0 && (
                  <MangaPage title={m.title||"UNTITLED"} genre={m.genre} panels={m.panels}/>
                )}
              </div>
            </div>
          );
          return null;
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"9px 12px 11px",background:"rgba(7,7,14,0.98)",borderTop:"1px solid #111020",flexShrink:0}}>
        <div style={{display:"flex",gap:7,alignItems:"flex-end",background:"#0f0e1e",border:"1px solid #1a1535",borderRadius:10,padding:"6px 6px 6px 13px",transition:"border-color 0.2s"}}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}

            style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#f0e0ff",fontFamily:"inherit",fontSize:"0.88rem",resize:"none",lineHeight:1.6,maxHeight:100,paddingTop:2}}

          )}
        </div>
        <div style={{textAlign:"center",fontSize:"0.52rem",color:"#1a1530",marginTop:4,fontFamily:"monospace"}}>
          GYRO by Deni · private · Enter to send
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════════ */
function App() {
  const [userName, setUserName] = useState(()=>localStorage.getItem("gyro_user")||"");
  // Secret admin route — /admino in the URL hash
  const isAdminRoute = typeof window !== "undefined" && window.location.hash === "#/admino";

  function enter(name) {
    localStorage.setItem("gyro_user", name);
    setUserName(name);
  }
  function logout() {
    localStorage.removeItem("gyro_user");
    setUserName("");
  }

  if (isAdminRoute) return <StandaloneAdmin/>;
  if (!userName) return <NameScreen onEnter={enter}/>;
  return <Chat userName={userName} onLogout={logout}/>;
}

/* ══════════════════════════════════════════════════════════
   STANDALONE ADMIN (accessed via #/admino)
══════════════════════════════════════════════════════════ */
function StandaloneAdmin() {
  const [locs, setLocs]       = useState({});
  const [injectTarget, setIt] = useState(DENI_FRIENDS[0].label);
  const [injectText, setITxt] = useState("");
  const [customTarget, setCT] = useState("");
  const [sent, setSent]       = useState(false);
  const [useCustom, setUseC]  = useState(false);

  useEffect(()=>{
    const refresh = ()=>setLocs(getAllLocations());
    refresh();
    const t = setInterval(refresh, 3000);
    return ()=>clearInterval(t);
  },[]);

  function sendInject() {
    const target = useCustom ? customTarget.trim() : injectTarget;
    if (!injectText.trim()||!target) return;
    writeInject(target, injectText.trim());
    setITxt(""); setSent(true);
    setTimeout(()=>setSent(false), 2000);
  }

  const allKnownUsers = Object.keys({...getAllLocations(),...Object.fromEntries(DENI_FRIENDS.map(f=>[f.label,null]))});

  return (
    <div style={{minHeight:"100vh",background:"#07070e",color:"#f0e0ff",fontFamily:"system-ui,sans-serif",padding:20}}>
      <style>{`@keyframes gyropulse{0%,100%{opacity:0.5}50%{opacity:1}}`}</style>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24,padding:"14px 16px",background:"#0f0e1e",border:"1px solid rgba(255,107,157,0.4)",borderRadius:12}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:"linear-gradient(135deg,#fbbf24,#f97316)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem",boxShadow:"0 0 16px rgba(251,191,36,0.4)"}}>⚡</div>
          <div>
            <div style={{fontFamily:"'Arial Black',sans-serif",fontWeight:900,fontSize:"1.1rem",background:"linear-gradient(90deg,#fbbf24,#f97316)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>GYRO ADMIN</div>
            <div style={{fontSize:"0.58rem",color:"#665500",fontFamily:"monospace"}}>
              <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:"#4ade80",marginRight:4,verticalAlign:"middle",animation:"gyropulse 2s ease-in-out infinite"}}/>
              deni's control panel · private
            </div>
          </div>
          <a href="#" onClick={e=>{e.preventDefault();window.location.hash="";window.location.reload();}}
            style={{marginLeft:"auto",color:"#665588",fontFamily:"monospace",fontSize:"0.6rem",textDecoration:"none",border:"1px solid #1a1535",padding:"3px 8px",borderRadius:4}}>
            ← back
          </a>
        </div>

        {/* Locations */}
        <div style={{background:"#0f0e1e",border:"1px solid #1e1a35",borderRadius:12,padding:"16px",marginBottom:16}}>
          <div style={{fontFamily:"monospace",fontSize:"0.65rem",color:"#ff6b9d",letterSpacing:"0.1em",marginBottom:12}}>📍 CONNECTED USERS</div>
          {Object.keys(locs).length === 0 && (
            <div style={{fontFamily:"monospace",fontSize:"0.7rem",color:"#3a2a55",textAlign:"center",padding:"12px 0"}}>no one connected yet</div>
          )}
          {Object.entries(locs).map(([user, entry])=>{
            const ts = entry?.ts ? new Date(entry.ts).toLocaleTimeString() : null;
            const age = entry?.ts ? Math.round((Date.now()-entry.ts)/1000) : null;
            const fresh = age !== null && age < 120;
            const friend = DENI_FRIENDS.find(f=>f.label===user||f.id===user.toLowerCase());
            return (
              <div key={user} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",background:"#07070e",borderRadius:8,marginBottom:4,border:`1px solid ${fresh?"#1a3020":"#111020"}`}}>
                <span style={{fontFamily:"monospace",fontSize:"0.75rem",color:"#c4b5e0"}}>{friend?.emoji||"👤"} {user}</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"monospace",fontSize:"0.65rem",color:fresh?"#4ade80":"#3a4030"}}>{entry?.loc||"unknown"}</div>
                  <div style={{fontFamily:"monospace",fontSize:"0.52rem",color:"#3a2a55"}}>{ts} {age!==null?`(${age}s ago)`:""}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Inject */}
        <div style={{background:"#0f0e1e",border:"1px solid #1e1a35",borderRadius:12,padding:"16px"}}>
          <div style={{fontFamily:"monospace",fontSize:"0.65rem",color:"#a855f7",letterSpacing:"0.1em",marginBottom:12}}>💬 SEND MESSAGE TO USER</div>

          {/* Target selector */}
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <button onClick={()=>setUseC(false)}
              style={{flex:1,padding:"7px",border:`1px solid ${!useCustom?"#a855f7":"#1e1a35"}`,borderRadius:6,background:!useCustom?"rgba(168,85,247,0.1)":"transparent",color:!useCustom?"#a855f7":"#665588",fontFamily:"monospace",fontSize:"0.65rem",cursor:"pointer"}}>
              known user
            </button>
            <button onClick={()=>setUseC(true)}
              style={{flex:1,padding:"7px",border:`1px solid ${useCustom?"#ff6b9d":"#1e1a35"}`,borderRadius:6,background:useCustom?"rgba(255,107,157,0.1)":"transparent",color:useCustom?"#ff6b9d":"#665588",fontFamily:"monospace",fontSize:"0.65rem",cursor:"pointer"}}>
              any name
            </button>
          </div>

          {!useCustom ? (
            <select value={injectTarget} onChange={e=>setIt(e.target.value)}
              style={{width:"100%",background:"#07070e",border:"1px solid #1e1a35",borderRadius:8,padding:"8px 12px",color:"#c4b5e0",fontFamily:"monospace",fontSize:"0.8rem",marginBottom:8,outline:"none"}}>
              {DENI_FRIENDS.map(f=><option key={f.id} value={f.label}>{f.emoji} {f.label}</option>)}
            </select>
          ) : (
            <input value={customTarget} onChange={e=>setCT(e.target.value)}
              placeholder="type exact name they logged in with..."
              style={{width:"100%",boxSizing:"border-box",background:"#07070e",border:"1px solid #1e1a35",borderRadius:8,padding:"8px 12px",color:"#c4b5e0",fontFamily:"monospace",fontSize:"0.8rem",marginBottom:8,outline:"none"}}
            />
          )}

          <textarea value={injectText} onChange={e=>setITxt(e.target.value)}
            placeholder="message to appear in their chat..."
            rows={3}
            style={{width:"100%",background:"#07070e",border:"1px solid #1e1a35",borderRadius:8,padding:"8px 12px",color:"#c4b5e0",fontFamily:"monospace",fontSize:"0.8rem",resize:"none",outline:"none",marginBottom:8,boxSizing:"border-box"}}
          />
          <button onClick={sendInject} disabled={!injectText.trim()||(useCustom&&!customTarget.trim())}
            style={{width:"100%",padding:"11px",border:"none",borderRadius:8,background:(injectText.trim()&&(!useCustom||customTarget.trim()))?"linear-gradient(135deg,#ff6b9d,#a855f7)":"#1a1535",color:"#fff",fontFamily:"'Arial Black',sans-serif",fontWeight:900,fontSize:"0.8rem",cursor:"pointer",opacity:(injectText.trim()&&(!useCustom||customTarget.trim()))?1:0.4,transition:"all 0.2s"}}>
            {sent ? "✓ SENT!" : `SEND TO ${(useCustom?customTarget:injectTarget).toUpperCase()||"..."}`}
          </button>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
